databaseChangeLog:
  - changeSet:
      id: 1.0-create-users-table
      author: radmiy
      changes:
        - createTable:
            tableName: users
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: username
                  type: VARCHAR(255)
                  constraints:
                    unique: true
                    nullable: false
              - column:
                  name: email
                  type: VARCHAR(255)
                  constraints:
                    unique: true
                    nullable: false
              - column:
                  name: password
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: role
                  type: VARCHAR(50)
                  constraints:
                    nullable: false

  - changeSet:
      id: 1.0-create-tasks-table
      author: radmiy
      changes:
          - createTable:
              tableName: tasks
              columns:
                - column:
                    name: id
                    type: UUID
                    constraints:
                      primaryKey: true
                      nullable: false
                - column:
                    name: title
                    type: VARCHAR(255)
                    constraints:
                      nullable: false
                - column:
                    name: description
                    type: CLOB
                - column:
                    name: status
                    type: VARCHAR(50)
                    constraints:
                      nullable: false
                - column:
                    name: priority
                    type: VARCHAR(50)
                    constraints:
                      nullable: false
                - column:
                    name: author_id
                    type: UUID
                    constraints:
                      nullable: false
                      foreignKeyName: fk_task_author_user_id
                      referencedTableName: users
                      referencedColumnNames: id
                - column:
                    name: assignee_id
                    type: UUID
                    constraints:
                      foreignKeyName: fk_task_assignee_user_id
                      referencedTableName: users
                      referencedColumnNames: id
                - column:
                    name: created_at
                    type: TIMESTAMP WITH TIME ZONE
                    constraints:
                      nullable: false
                - column:
                    name: updated_at
                    type: TIMESTAMP WITH TIME ZONE
                    constraints:
                      nullable: false
